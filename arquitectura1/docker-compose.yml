services:
  postgres:
    image: postgres:16
    container_name: eventos_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "101610"
      POSTGRES_DB: eventos_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: eventos_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: eventos_db
      DB_USER: postgres
      DB_PASS: "101610"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
