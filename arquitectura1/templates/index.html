<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Reservas - Contador</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .caja { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        #respuesta { background: #f4f4f4; padding: 10px; border-left: 4px solid #0056b3; }
        .evento-item, .ticket-item { margin-bottom: 10px; padding: 10px; background: #eef; border-radius: 4px; }
        .btn-accion { margin-left: 10px; cursor: pointer; background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px;}
        .contador { font-size: 24px; color: red; font-weight: bold; }
        #zona-temporizador { display: none; background: #ffeeba; padding: 15px; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>Sistema de Reservas con Temporizador</h1>

    <div class="caja">
        <h2>1. Eventos</h2>
        <button onclick="cargarEventos()">Cargar Eventos</button>
        <div id="lista-eventos" style="margin-top: 15px;"></div>
    </div>

    <div class="caja">
        <h2>2. Tickets Disponibles</h2>
        <h3 id="nombre_evento">Selecciona un evento primero</h3>
        <label>Tu ID de Usuario:</label>
        <input type="number" id="input_usuario" value="1"><br><br>
        
        <div id="lista-tickets"></div>

        <div id="zona-temporizador">
            <p>Tienes <span id="reloj" class="contador">30</span> segundos para confirmar la compra del <b>Ticket #<span id="ticket_bloqueado"></span></b>.</p>
            <button onclick="confirmarCompra()" class="btn-accion" style="background:#0056b3;">Confirmar Compra Definitiva</button>
        </div>
    </div>

    <div class="caja">
        <h2>3. Panel Admin (Ver Todas)</h2>
        <button onclick="cargarReservas()">Actualizar Tabla</button>
        <div id="lista-reservas" style="margin-top: 15px;"></div>
    </div>

    <div class="caja">
        <h2>Consola del Servidor</h2>
        <pre id="respuesta">Esperando...</pre>
    </div>

    <script>
        let intervaloReloj; // Guarda el ID del temporizador

        // --- 1. EVENTOS ---
        async function cargarEventos() {
            document.getElementById("lista-eventos").innerHTML = "Cargando...";
            const data = await (await fetch('/eventos')).json();
            document.getElementById("lista-eventos").innerHTML = "";
            data.forEach(e => {
                document.getElementById("lista-eventos").innerHTML += `
                <div class="evento-item">
                    <b>${e.nombre}</b>
                    <button class="btn-accion" onclick="verTickets(${e.id}, '${e.nombre}')">Ver Tickets Disponibles</button>
                </div>`;
            });
        }

        // --- 2. VER TICKETS DISPONIBLES ---
        async function verTickets(eventoId, nombre) {
            document.getElementById("nombre_evento").innerText = "Tickets para: " + nombre;
            const data = await (await fetch('/eventos/' + eventoId + '/tickets')).json();
            
            const lista = document.getElementById("lista-tickets");
            lista.innerHTML = "";
            
            if(data.length === 0) {
                lista.innerHTML = "<p>Agotado. No hay tickets disponibles.</p>";
                return;
            }
            
            data.forEach(t => {
                lista.innerHTML += `
                <span class="ticket-item" style="display:inline-block; margin-right: 10px;">
                    Ticket #${t.ticket_id}
                    <button class="btn-accion" onclick="bloquearTicket(${t.ticket_id})">Bloquear</button>
                </span>`;
            });
        }

        // --- 3. BLOQUEAR TICKET (PRE-RESERVA 30s) ---
        async function bloquearTicket(ticketId) {
            const usuarioId = document.getElementById("input_usuario").value;
            const resp = await fetch('/reservar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ticket_id: ticketId, usuario_id: parseInt(usuarioId) })
            });
            const data = await resp.json();
            
            if(resp.ok) {
                iniciarTemporizador(ticketId);
                document.getElementById("respuesta").innerText = "Bloqueo exitoso. Tienes 30 segundos.";
                cargarReservas();
            } else {
                alert(data.error); // Alguien te ganó el ticket
            }
        }

        // --- 4. EL RELOJ ---
        function iniciarTemporizador(ticketId) {
            clearInterval(intervaloReloj); // Limpiar si había uno previo
            
            document.getElementById("zona-temporizador").style.display = "block";
            document.getElementById("ticket_bloqueado").innerText = ticketId;
            document.getElementById("lista-tickets").innerHTML = ""; // Esconder otros tickets
            
            let segundos = 30;
            document.getElementById("reloj").innerText = segundos;
            
            intervaloReloj = setInterval(() => {
                segundos--;
                document.getElementById("reloj").innerText = segundos;
                
                if(segundos <= 0) {
                    clearInterval(intervaloReloj);
                    document.getElementById("zona-temporizador").style.display = "none";
                    alert("¡Tiempo agotado! El ticket fue liberado.");
                    document.getElementById("nombre_evento").innerText = "Elige un evento de nuevo";
                    cargarReservas(); // Actualizamos admin
                }
            }, 1000); // Se ejecuta cada 1000 milisegundos (1 segundo)
        }

        // --- 5. CONFIRMAR LA COMPRA FINAL ---
        async function confirmarCompra() {
            const ticketId = document.getElementById("ticket_bloqueado").innerText;
            const usuarioId = document.getElementById("input_usuario").value;
            
            const resp = await fetch('/confirmar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ticket_id: parseInt(ticketId), usuario_id: parseInt(usuarioId) })
            });
            const data = await resp.json();
            
            if(resp.ok) {
                clearInterval(intervaloReloj); // Detener reloj
                document.getElementById("zona-temporizador").style.display = "none";
                document.getElementById("respuesta").innerText = "¡FELICIDADES! Compra confirmada.";
                alert("¡Compra Exitosa!");
                cargarReservas();
            } else {
                alert(data.error); // Falló (quizá justo expiró)
            }
        }

        // --- 6. ADMIN ---
        async function cargarReservas() {
            const data = await (await fetch('/reservas')).json();
            const lista = document.getElementById("lista-reservas");
            lista.innerHTML = "";
            data.forEach(r => {
                lista.innerHTML += `
                <div class="ticket-item">
                    <b>Ticket #${r.ticket_id}</b> | Usuario: ${r.usuario_nombre} | Evento: ${r.evento_nombre} | Estado: <b>${r.estado}</b>
                    <button style="background:red; color:white; border:none; cursor:pointer;" onclick="liberarAdmin(${r.ticket_id})">Liberar</button>
                </div>`;
            });
        }

        async function liberarAdmin(ticketId) {
            await fetch('/reservas/' + ticketId, { method: 'DELETE' });
            cargarReservas();
        }
    </script>
</body>
</html>
